<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All-Pro Private CRM Portal</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <style>
    :root{
      --bg:#0b1220;
      --card:#121a2d;
      --line:#2c3e63;
      --text:#e9f0ff;
      --muted:#a5b5d6;
      --accent:#2f7df6;
      --accent2:#1a4ca8;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;height:100%}
    body{font-family:"Segoe UI",Arial,sans-serif;background:radial-gradient(circle at top left,#182744 0%,var(--bg) 55%);color:var(--text)}
    .gate{
      position:fixed;inset:0;display:grid;place-items:center;background:rgba(4,7,12,.88);z-index:10
    }
    .panel{
      width:min(460px,92vw);background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px
    }
    h1{margin:0 0 8px;font-size:1.2rem}
    p{margin:0 0 10px;color:var(--muted)}
    label{display:block;font-size:.86rem;color:var(--muted);margin-bottom:6px}
    input{
      width:100%;background:#0d1526;color:var(--text);border:1px solid #334a75;border-radius:10px;padding:10px;font:inherit
    }
    .btn{
      margin-top:10px;border:1px solid #3b63a3;background:linear-gradient(180deg,var(--accent),var(--accent2));color:#fff;
      padding:9px 12px;border-radius:10px;cursor:pointer;font-weight:700
    }
    .hint{margin-top:10px;font-size:.85rem;color:#fda4af}
    .frame-wrap{height:100%;display:none}
    .frame-wrap.show{display:block}
    iframe{width:100%;height:100%;border:0;background:#0b1220}
    .bar{
      position:fixed;left:0;right:0;top:0;height:34px;background:#0b1220;border-bottom:1px solid #24385f;display:none;
      align-items:center;justify-content:space-between;padding:0 10px;z-index:11;color:#cdd9f6;font-size:.82rem
    }
    .bar.show{display:flex}
    .bar a{color:#9fc0ff;text-decoration:none}
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <div class="panel">
      <h1>All-Pro Private CRM</h1>
      <p>Hidden portal for your internal CRM workflow.</p>
      <label for="passcode">Passcode</label>
      <input id="passcode" type="password" />
      <button class="btn" id="unlockBtn" type="button">Unlock CRM</button>
      <div class="hint" id="msg"></div>
    </div>
  </div>

  <div class="bar" id="topbar">
    <span>All-Pro Private CRM Session</span>
    <a href="#" id="lockNow">Lock</a>
  </div>
  <div class="frame-wrap" id="frameWrap">
    <iframe
      id="crmFrame"
      src="about:blank"
      title="All-Pro CRM"
      referrerpolicy="no-referrer"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-downloads">
    </iframe>
  </div>

  <script>
    const PASSCODE = "AllProOnly-2026";
    const CRM_URL = "https://tonybeal.net/meetmeg-growth-partner/tonyos-crm.html";
    const gate = document.getElementById("gate");
    const msg = document.getElementById("msg");
    const frameWrap = document.getElementById("frameWrap");
    const frame = document.getElementById("crmFrame");
    const topbar = document.getElementById("topbar");

    function unlock() {
      const v = document.getElementById("passcode").value;
      if (v !== PASSCODE) {
        msg.textContent = "Incorrect passcode.";
        return;
      }
      gate.style.display = "none";
      frameWrap.classList.add("show");
      topbar.classList.add("show");
      frame.src = CRM_URL;
      sessionStorage.setItem("allpro_private_crm_unlocked", "1");
    }

    document.getElementById("unlockBtn").addEventListener("click", unlock);
    document.getElementById("passcode").addEventListener("keydown", (e) => {
      if (e.key === "Enter") unlock();
    });

    document.getElementById("lockNow").addEventListener("click", (e) => {
      e.preventDefault();
      frame.src = "about:blank";
      frameWrap.classList.remove("show");
      topbar.classList.remove("show");
      gate.style.display = "grid";
      document.getElementById("passcode").value = "";
      sessionStorage.removeItem("allpro_private_crm_unlocked");
    });

    if (sessionStorage.getItem("allpro_private_crm_unlocked") === "1") {
      gate.style.display = "none";
      frameWrap.classList.add("show");
      topbar.classList.add("show");
      frame.src = CRM_URL;
    }
  </script>
</body>
</html>
