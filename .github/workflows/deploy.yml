name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Validate SEO and priority lead pages
        run: |
          python scripts/seo_audit.py --fail-under 95
          python scripts/validate_priority_lead_pages.py
          node --test workers/lead-concierge/test/*.test.js
      - name: Build public site artifact
        run: python scripts/build_public_site.py
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
      - name: Notify IndexNow about changed pages
        run: >-
          python scripts/submit_indexnow.py
          --base "${{ github.event.before }}"
          --head "${{ github.sha }}"
